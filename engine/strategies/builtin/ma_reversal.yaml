key: ma_reversal
name: 均线拐点
description: 用短中期均线金叉、排列和动量识别趋势从修复走向确认的阶段。
tags: [trend, reversal, moving_average]
risk_bias: balanced
rules:
  - metric: trend.golden_cross_3d
    op: truthy
    value: true
    required: true
    weight: 8
    evidence: 最近三个交易日内至少出现一次短中期均线金叉，拐点事件成立。
    risk: 最近没有发生均线金叉，不应按均线拐点策略处理。
  - metric: trend.ma5_cross_above_ma10_3d
    op: truthy
    value: true
    weight: 8
    evidence: MA5 在最近三个交易日内上穿 MA10，短线金叉成立。
    risk: 最近未出现 MA5 上穿 MA10，拐点信号仍不完整。
  - metric: trend.ma10_cross_above_ma20_3d
    op: truthy
    value: true
    weight: 8
    evidence: MA10 上穿 MA20，中短期趋势确认度提高。
  - metric: trend.above_ma20
    op: truthy
    value: true
    weight: 8
    evidence: 价格重新站上 MA20，短线修复开始成形。
  - metric: trend.ma20_slope_pct
    op: ">"
    value: 0
    weight: 8
    evidence: MA20 斜率转正，趋势拐点质量提高。
  - metric: momentum.macd_hist
    op: ">"
    value: 0
    weight: 8
    evidence: MACD 柱体转正，动量配合均线修复。
  - metric: trend.above_ma60
    op: truthy
    value: true
    weight: 8
    evidence: 站上 MA60 后，中期趋势确认度提升。
    risk: 若仍在 MA60 下方，拐点只适合作为试探信号。
