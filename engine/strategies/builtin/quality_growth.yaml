key: quality_growth
name: 质量成长
description: 偏好趋势稳定、波动适中且未明显拥挤过热的成长型标的。
tags: [quality, growth]
risk_bias: balanced
rules:
  - metric: fundamentals.revenue_yoy
    op: ">="
    value: 0
    weight: 12
    required: true
    evidence: 营收保持同比增长，成长逻辑有基本面支持。
    risk: 缺少营收增长数据，质量成长策略不得作为核心结论。
  - metric: fundamentals.roe
    op: ">="
    value: 0.08
    weight: 10
    evidence: ROE 达到基本质量门槛。
  - metric: trend.above_ma120
    op: truthy
    value: true
    weight: 14
    evidence: 长期趋势结构较好。
  - metric: levels.atr_pct
    op: "<="
    value: 4.5
    weight: 12
    evidence: 波动率仍处于可管理范围。
  - metric: momentum.rsi14
    op: "<="
    value: 72
    weight: 8
    evidence: 动量未达到极端过热。
