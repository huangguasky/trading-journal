key: event_catalyst
name: 事件催化
description: 结合新闻与事件密度判断催化强度，同时尊重价格确认。
tags: [event, news]
risk_bias: aggressive
rules:
  - metric: news_count
    op: ">="
    value: 1
    weight: 12
    evidence: 近期存在事件或消息流。
  - metric: trend.above_ma20
    op: truthy
    value: true
    weight: 10
    evidence: 价格走势对事件解读形成确认。
  - metric: volume.volume_ratio_5_20
    op: ">="
    value: 1
    weight: 8
    evidence: 成交量支持市场关注度提升。
