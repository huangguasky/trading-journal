key: breakout_volume
name: Volume Breakout
description: Favor setups near resistance with expanding turnover.
tags: [breakout, volume]
risk_bias: aggressive
rules:
  - metric: levels.distance_to_resistance_pct
    op: "<="
    value: 3
    weight: 18
    evidence: Price is close to 20-day resistance.
    risk: False breakout risk is high without follow-through.
  - metric: volume.volume_ratio_5_20
    op: ">="
    value: 1.18
    weight: 20
    evidence: Recent volume is above the 20-day average.
  - metric: momentum.return_20d_pct
    op: ">="
    value: 4
    weight: 10
    evidence: Recent relative strength is positive.

