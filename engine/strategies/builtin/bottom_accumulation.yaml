key: bottom_accumulation
name: 底部蓄势
description: 关注跌幅释放后靠近支撑、动量修复且筹码拥挤度下降的低位修复机会。
tags: [reversal, bottom, accumulation]
risk_bias: balanced
rules:
  - metric: levels.distance_to_support_pct
    op: "<="
    value: 5
    weight: 14
    evidence: 价格靠近阶段支撑，具备低位观察价值。
    risk: 若支撑继续失守，底部假设需要撤销。
  - metric: momentum.rsi14
    op: "<="
    value: 55
    weight: 10
    evidence: RSI 未进入过热区，修复空间仍在。
  - metric: chips.profit_position_pct
    op: "<="
    value: 68
    weight: 12
    evidence: 获利盘比例不高，筹码压力相对可控。
  - metric: levels.atr_pct
    op: "<="
    value: 6
    weight: 8
    evidence: 波动未失控，适合继续跟踪筑底质量。

