name: Release desktop app

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.name }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Windows x64
            os: windows-latest
          - name: macOS x64
            os: macos-15-intel
          - name: macOS Apple Silicon
            os: macos-15
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: pip

      - name: Install Python engine and packager
        run: python -m pip install . "pyinstaller>=6.11,<7"

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: desktop/package-lock.json

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install frontend dependencies
        working-directory: desktop
        run: npm ci

      - name: Build standalone Python sidecar
        run: python tools/build_sidecar.py

      - name: Smoke test standalone Python sidecar
        run: python tools/smoke_test_sidecar.py

      - name: Build and publish Tauri bundles
        uses: tauri-apps/tauri-action@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          projectPath: desktop
          tagName: ${{ startsWith(github.ref, 'refs/tags/') && github.ref_name || '' }}
          releaseName: ${{ startsWith(github.ref, 'refs/tags/') && format('Trading Journal {0}', github.ref_name) || '' }}
          releaseBody: "Standalone installers. No Python or Conda installation is required."
          releaseDraft: false
          prerelease: false
          generateReleaseNotes: true
          uploadWorkflowArtifacts: true
